<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BMG+ CRM | Digital Architect Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-container": "#a8b8ff",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#283044",
                        "on-tertiary-container": "#9cbbff",
                        "surface": "#faf8ff",
                        "surface-container": "#eaedff",
                        "secondary-container": "#dae2fd",
                        "primary-fixed": "#dde1ff",
                        "surface-tint": "#3755c3",
                        "tertiary": "#003272",
                        "on-secondary-container": "#5c647a",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#004395",
                        "on-secondary-fixed": "#131b2e",
                        "on-surface-variant": "#444653",
                        "outline-variant": "#c4c5d5",
                        "secondary-fixed": "#dae2fd",
                        "on-secondary-fixed-variant": "#3f465c",
                        "tertiary-fixed-dim": "#adc6ff",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f3ff",
                        "background": "#faf8ff",
                        "secondary": "#565e74",
                        "tertiary-container": "#00489e",
                        "surface-container-highest": "#dae2fd",
                        "tertiary-fixed": "#d8e2ff",
                        "on-primary-fixed": "#001453",
                        "inverse-on-surface": "#eef0ff",
                        "error": "#ba1a1a",
                        "surface-variant": "#dae2fd",
                        "primary": "#00288e",
                        "secondary-fixed-dim": "#bec6e0",
                        "on-primary-fixed-variant": "#173bab",
                        "on-tertiary-fixed": "#001a42",
                        "outline": "#757684",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e2e7ff",
                        "on-surface": "#131b2e",
                        "inverse-primary": "#b8c4ff",
                        "surface-bright": "#faf8ff",
                        "on-secondary": "#ffffff",
                        "primary-container": "#1e40af",
                        "primary-fixed-dim": "#b8c4ff",
                        "on-error": "#ffffff",
                        "surface-dim": "#d2d9f4",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#131b2e"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
        }
        
        /* Three.js Fallback/Simulation Background */
        .neural-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }

        .orb-blue {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(59, 130, 246, 0) 70%);
            top: -10%;
            left: -10%;
            filter: blur(80px);
        }

        .orb-violet {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.10) 0%, rgba(139, 92, 246, 0) 70%);
            bottom: -5%;
            right: -5%;
            filter: blur(80px);
        }

        .particles-overlay {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1000 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(59, 130, 246, 0.5);
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
<!-- Background Layer -->
<div class="neural-bg">
<div class="orb-blue"></div>
<div class="orb-violet"></div>
<div class="particles-overlay"></div>
<!-- Constellation simulation lines via SVG -->
<svg class="absolute inset-0 w-full h-full opacity-20" xmlns="http://www.w3.org/2000/svg">
<defs>
<lineargradient id="lineGrad" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"></stop>
<stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.2"></stop>
</lineargradient>
</defs>
<path d="M100 200 L300 400 M500 100 L700 300 M800 600 L950 800 M100 800 L400 600" fill="none" stroke="url(#lineGrad)" stroke-width="0.5"></path>
<circle cx="100" cy="200" fill="white" opacity="0.4" r="1.5"></circle>
<circle cx="300" cy="400" fill="white" opacity="0.3" r="1"></circle>
<circle cx="500" cy="100" fill="white" opacity="0.4" r="1.5"></circle>
<circle cx="700" cy="300" fill="white" opacity="0.3" r="1"></circle>
<circle cx="800" cy="600" fill="white" opacity="0.5" r="2"></circle>
<circle cx="950" cy="800" fill="white" opacity="0.3" r="1"></circle>
</svg>
</div>
<!-- Login Container -->
<main class="w-full max-w-[440px] z-10">
<div class="glass-panel rounded-xl p-10 flex flex-col items-center">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/40 mb-4 transform -rotate-3 transition-transform hover:rotate-0 duration-500">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">architecture</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-white mb-1">BMG+</h1>
<p class="text-blue-400/80 text-sm font-medium tracking-[0.2em] uppercase">Digital Architect</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1" for="email">Work Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-400 transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="input-glass w-full pl-11 pr-4 py-3.5 rounded-lg text-sm tabular-nums placeholder:text-slate-600 focus:ring-0" id="email" name="email" placeholder="architect@bmg.plus" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex items-center justify-between ml-1">
<label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider" for="password">Security Key</label>
<a class="text-[10px] font-bold text-blue-500 hover:text-blue-400 uppercase transition-colors" href="#">Reset Access</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-400 transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="input-glass w-full pl-11 pr-4 py-3.5 rounded-lg text-sm placeholder:text-slate-600 focus:ring-0" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center space-x-2 pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-slate-700 bg-slate-800/50 text-blue-600 focus:ring-blue-500/20" id="remember" type="checkbox"/>
</div>
<label class="text-xs text-slate-400 cursor-pointer" for="remember">Persist session for 30 days</label>
</div>
<button class="w-full bg-gradient-to-r from-blue-700 via-blue-600 to-indigo-600 hover:from-blue-600 hover:to-indigo-500 text-white font-bold py-4 px-6 rounded-lg transition-all duration-300 shadow-xl shadow-blue-900/20 active:scale-[0.98] flex items-center justify-center gap-2 group" type="submit">
<span>Initialize Core</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Metadata -->
<div class="mt-12 w-full pt-8 border-t border-white/5 flex flex-col items-center gap-4">
<div class="flex items-center gap-4 grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-500">
<div class="h-1 w-12 rounded-full bg-blue-500"></div>
<div class="h-1 w-12 rounded-full bg-green-500"></div>
<div class="h-1 w-12 rounded-full bg-amber-500"></div>
<div class="h-1 w-12 rounded-full bg-red-500"></div>
</div>
<p class="text-[10px] text-slate-500 tracking-widest uppercase font-medium">System Version 4.8.2 // Encrypted Auth</p>
</div>
</div>
<!-- External Context Action -->
<p class="text-center mt-8 text-slate-500 text-xs">
            Don't have an architect account? 
            <a class="text-blue-400 font-bold hover:underline ml-1" href="#">Request Deployment</a>
</p>
</main>
<!-- Decorative Corner Accents -->
<div class="fixed top-8 left-8 hidden lg:block">
<div class="flex items-center gap-3">
<div class="w-px h-8 bg-blue-500/30"></div>
<div class="text-[10px] text-slate-500 tracking-tighter tabular-nums leading-none">
                LOC: 34.0522° N<br/>
                118.2437° W
            </div>
</div>
</div>
<div class="fixed bottom-8 right-8 hidden lg:block">
<div class="flex items-center gap-3">
<div class="text-right text-[10px] text-slate-500 tracking-tighter tabular-nums leading-none">
                NODE_01_STATUS: ACTIVE<br/>
                UPTIME: 99.99%
            </div>
<div class="w-px h-8 bg-blue-500/30"></div>
</div>
</div>
</body></html>
